# Drasi Server config for the building_comfort / drasi_server_grpc_adaptive
# E2E test.
#
# Same wire layout as drasi_server_grpc, but the test framework dispatches
# events with adaptive batching enabled (batch_size=1000, batch_timeout_ms=50).
# Drasi Server's gRPC source plugin handles batched payloads transparently,
# so the server-side config is identical.
#
# Run from this folder using either:
#   a) the prebuilt drasi-server binary (see
#      https://drasi.io/drasi-server/how-to-guides/installation/download-binary/):
#        <path/to>/bin/drasi-server --config drasi_server_config.yaml
#   b) a checkout of the drasi-server repo:
#        cargo run --release --manifest-path <path/to/drasi-server>/Cargo.toml -- --config drasi_server_config.yaml

apiVersion: drasi.io/v1
id: building-comfort-grpc-adaptive
host: "0.0.0.0"
port: 8080
logLevel: info
persistConfig: false

autoInstallPlugins: true
# Disable cosign signature verification so locally-built plugins
# (e.g. target/release/plugins/ when running via `cargo run` from a
# drasi-server checkout) are loaded without a signed lockfile.
verifyPlugins: false
plugins:
  - ref: source/grpc
  - ref: reaction/grpc
  - ref: reaction/log

sources:
  - kind: grpc
    id: facilities-db
    autoStart: true
    host: "0.0.0.0"
    port: 50051
    timeoutMs: 60000

queries:
  - id: building-comfort
    autoStart: true
    queryLanguage: Cypher
    sources:
      - sourceId: facilities-db
    query: |
      MATCH (r:Room)
      RETURN elementId(r) AS RoomId,
             r.temperature AS Temperature,
             r.humidity AS Humidity,
             r.co2 AS Co2

reactions:
  - kind: grpc
    id: building-comfort-out
    autoStart: true
    queries:
      - building-comfort
    endpoint: "grpc://localhost:50052"
    timeoutMs: 60000
    # Larger batches to match the adaptive dispatcher's throughput.
    batchSize: 100
    batchFlushTimeoutMs: 50
    maxRetries: 5
    connectionRetryAttempts: 10
    initialConnectionTimeoutMs: 15000
    metadata:
      x-query-sequence: "building-comfort"
