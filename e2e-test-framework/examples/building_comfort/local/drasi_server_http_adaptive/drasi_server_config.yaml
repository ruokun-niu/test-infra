# Drasi Server config for the building_comfort / drasi_server_http_adaptive
# E2E test.
#
# Wire layout differs from drasi_server_http:
#   - source dispatcher targets http://localhost:8081 with source_id "events-http"
#     (adaptive batching: batch_size=1000, batch_timeout_ms=50)
#   - reaction handler listens at http://localhost:3000/events
#   - reaction test_reaction_id is "http-webhook"
#
# Run from this folder using either:
#   a) the prebuilt drasi-server binary (see
#      https://drasi.io/drasi-server/how-to-guides/installation/download-binary/):
#        <path/to>/bin/drasi-server --config drasi_server_config.yaml
#   b) a checkout of the drasi-server repo:
#        cargo run --release --manifest-path <path/to/drasi-server>/Cargo.toml -- --config drasi_server_config.yaml

apiVersion: drasi.io/v1
id: building-comfort-http-adaptive
host: "0.0.0.0"
port: 8080
logLevel: info
persistConfig: false

autoInstallPlugins: true
# Disable cosign signature verification so locally-built plugins
# (e.g. target/release/plugins/ when running via `cargo run` from a
# drasi-server checkout) are loaded without a signed lockfile.
verifyPlugins: false
plugins:
  - ref: source/http
  - ref: reaction/http
  - ref: reaction/log

sources:
  # HTTP webhook source matching the dispatcher's source_id="events-http"
  # on port 8081.
  - kind: http
    id: events-http
    autoStart: true
    host: "0.0.0.0"
    port: 8081
    timeoutMs: 60000

queries:
  - id: building-comfort
    autoStart: true
    queryLanguage: Cypher
    sources:
      - sourceId: events-http
    query: |
      MATCH (r:Room)
      RETURN elementId(r) AS RoomId,
             r.temperature AS Temperature,
             r.humidity AS Humidity,
             r.co2 AS Co2

reactions:
  # HTTP webhook reaction posts query results to the test framework's
  # HttpReactionHandler at http://localhost:3000/events.
  - kind: http
    id: http-webhook
    autoStart: true
    queries:
      - building-comfort
    baseUrl: "http://localhost:3000"
    timeoutMs: 60000
    headers:
      Content-Type: "application/json"
      X-Query-Sequence: "building-comfort"
    routes:
      building-comfort:
        added:
          method: POST
          path: "/events"
        updated:
          method: POST
          path: "/events"
        deleted:
          method: POST
          path: "/events"
