# Drasi Server config for the building_comfort / drasi_server_grpc E2E test.
#
# The E2E test framework needs an external Drasi Server running with:
#   - a gRPC source listening on port 50051 (id "facilities-db") to receive
#     change events dispatched by the test framework, and
#   - a gRPC reaction streaming results of query "building-comfort" back to
#     the test framework's gRPC reaction handler at grpc://localhost:50052.
#
# Run from this folder using either:
#   a) the prebuilt drasi-server binary (see
#      https://drasi.io/drasi-server/how-to-guides/installation/download-binary/):
#        <path/to>/bin/drasi-server --config drasi_server_config.yaml
#   b) a checkout of the drasi-server repo:
#        cargo run --release --manifest-path <path/to/drasi-server>/Cargo.toml -- --config drasi_server_config.yaml

apiVersion: drasi.io/v1
id: building-comfort-grpc
host: "0.0.0.0"
port: 8080
logLevel: info
persistConfig: false

autoInstallPlugins: true
# Disable cosign signature verification so locally-built plugins
# (e.g. target/release/plugins/ when running via `cargo run` from a
# drasi-server checkout) are loaded without a signed lockfile.
verifyPlugins: false
plugins:
  - ref: source/grpc
  - ref: reaction/grpc
  - ref: reaction/log

sources:
  # gRPC source matching the dispatcher in config.json:
  #   { "kind": "Grpc", "host": "localhost", "port": 50051,
  #     "source_id": "facilities-db", ... }
  - kind: grpc
    id: facilities-db
    autoStart: true
    host: "0.0.0.0"
    port: 50051
    timeoutMs: 60000

queries:
  # The reaction in the E2E config subscribes to query_ids: ["building-comfort"]
  # so the query id must match. The BuildingHierarchy model data generator
  # produces Room nodes with temperature / humidity / co2 properties.
  - id: building-comfort
    autoStart: true
    queryLanguage: Cypher
    sources:
      - sourceId: facilities-db
    query: |
      MATCH (r:Room)
      RETURN elementId(r) AS RoomId,
             r.temperature AS Temperature,
             r.humidity AS Humidity,
             r.co2 AS Co2

reactions:
  # gRPC reaction streams query results back to the test framework's
  # GrpcReactionHandler listening at grpc://localhost:50052.
  - kind: grpc
    id: building-comfort-out
    autoStart: true
    queries:
      - building-comfort
    endpoint: "grpc://localhost:50052"
    timeoutMs: 60000
    batchSize: 1
    batchFlushTimeoutMs: 100
    maxRetries: 5
    connectionRetryAttempts: 10
    initialConnectionTimeoutMs: 15000
    metadata:
      x-query-sequence: "building-comfort"
